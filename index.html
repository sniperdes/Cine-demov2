<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cine Demo</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

/* HEADER */
.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px;
background:#111;
position:sticky;
top:0;
}

.logo{
color:#e50914;
font-size:22px;
font-weight:bold;
}

/* MENU */
.menu{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
background:#0b0b0b;
}

.menu button{
background:#1f1f1f;
border:none;
color:white;
padding:10px 14px;
border-radius:20px;
white-space:nowrap;
}

/* HOME */
.section{
padding:15px;
}

.title{
font-size:18px;
margin:10px 0;
color:#e5e5e5;
}

/* CARDS */
.row{
display:flex;
gap:10px;
overflow-x:auto;
padding-bottom:10px;
}

.card{
min-width:140px;
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card p{
margin:5px;
font-size:13px;
}

/* VISTAS */
.view{
display:none;
padding:15px;
}

.active{
display:block;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">CINE DEMO</div>
</div>

<!-- MENU -->
<div class="menu">
<button onclick="show('home')">🏠 Inicio</button>
<button onclick="show('peliculas')">🎬 Películas</button>
<button onclick="show('series')">📺 Series</button>
<button onclick="show('anime')">🎌 Anime</button>
<button onclick="show('adulto')">🔞 +18</button>
</div>

<!-- HOME -->
<div id="home" class="view active">
<div class="section">

<div class="title">🔥 Destacadas</div>

<div class="row">
<div class="card">
<img src="https://picsum.photos/200/300?1">
<p>Acción Total</p>
</div>

<div class="card">
<img src="https://picsum.photos/200/300?2">
<p>Terror Nocturno</p>
</div>

<div class="card">
<img src="https://picsum.photos/200/300?3">
<p>Aventura Final</p>
</div>
</div>

</div>
</div>

<!-- PELICULAS -->
<div id="peliculas" class="view">
<div class="title">🎬 Películas</div>

<div class="row">
<div class="card">
<img src="https://picsum.photos/200/300?4">
<p>Acción</p>
</div>

<div class="card">
<img src="https://picsum.photos/200/300?5">
<p>Terror</p>
</div>
</div>
</div>

<!-- SERIES -->
<div id="series" class="view">
<div class="title">📺 Series</div>
</div>

<!-- ANIME -->
<div id="anime" class="view">
<div class="title">🎌 Anime</div>
</div>

<!-- +18 -->
<div id="adulto" class="view">
<div class="title">🔞 Contenido +18</div>
</div>

<script>
function show(id){

document.querySelectorAll('.view')
.forEach(v => v.classList.remove('active'));

document.getElementById(id).classList.add('active');

}
</script>

</body>
</html>
