<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cine Bot</title>

    <!-- SDK Oficial de Telegram Mini Apps -->
    <script src="https://telegram.org"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0b0b;
            color: white;
            -webkit-user-select: none;
            user-select: none;
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #111;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            color: #e50914;
            font-size: 22px;
            font-weight: bold;
        }
          
        /* MENU */
        .menu {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px;
            background: #0b0b0b;
            scrollbar-width: none;
        }
        .menu::-webkit-scrollbar {
            display: none;
        }

        .menu button {
            background: #1f1f1f;
            border: none;
            color: white;
            padding: 10px 14px;
            border-radius: 20px;
            white-space: nowrap;
            font-weight: bold;
            cursor: pointer;
        }

        /* SECCIONES Y VISTAS */
        .section {
            padding: 15px;
        }

        .title {
            font-size: 18px;
            margin: 10px 0;
            color: #e5e5e5;
        }

        .view {
            display: none;
            padding: 15px;
        }

        .active {
            display: block;
        }

        /* CARDS */
        .row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .card {
            min-width: 140px;
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
        }
        .card:active {
            transform: scale(0.97);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card p {
            margin: 5px;
            font-size: 13px;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: #111;
            padding: 15px;
            width: 90%;
            max-width: 400px;
            border-radius: 12px;
            position: relative;
            text-align: center;
        }

        .close {
            position: absolute;
            right: 10px;
            top: 10px;
            cursor: pointer;
            font-size: 20px;
            color: #aaa;
        }

        .btn {
            display: block;
            width: 100%;
            background: #222;
            color: white;
            border: none;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .vip {
            background: gold;
            color: black;
        }

        /* BANNERS */
        .banner-slider {
            width: 100%;
            margin-bottom: 15px;
        }

        .banner-slider img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
        }

        .banner-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #666;
        }

        .active-dot {
            background: white;
        }

        /* BUSCADOR */
        .search-box {
            padding: 10px;
            background: #111;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #222;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <!-- MODAL FICHA DETALLES -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">✖</span>
            <h2 id="modal-title">Título</h2>
            <img id="modal-img" src="" style="width:100%; border-radius:10px;">
            <p id="modal-info">⭐ 8.5 | 🎭 Acción | 🕒 120 min</p>
            <p id="modal-desc">Descripción de la película</p>
            <button class="btn" onclick="verAnuncio()">📺 Ver con anuncios</button>
            <button class="btn vip" onclick="activarVip()">💎 VIP</button>
            <button class="btn" style="background: #333;" onclick="cerrarModal()">⬅ Volver</button>
        </div>
    </div>

    <!-- HEADER -->
    <div class="header">
        <div class="logo">CINE DEMO</div>
    </div>

    <!-- BUSCADOR -->
    <div class="search-box">
        <input type="text" id="buscar" placeholder="🔍 Buscar película..." onkeyup="buscarPelicula()">
    </div>

    <!-- MENU PRINCIPAL -->
    <div class="menu">
        <button onclick="show('home')">🏠 Inicio</button>
        <button onclick="show('peliculas')">🎬 Películas</button>
        <button onclick="show('series')">📺 Series</button>
        <button onclick="show('anime')">🎌 Anime</button>
        <button onclick="show('adulto')">🔞 +18</button>
    </div>

    <!-- HOME (INICIO) -->
    <div id="home" class="view active">
        <div class="section">
            <div class="title">🔥 Destacadas</div>
            <div class="banner-slider">
                <img id="banner-img" src="https://picsum.photos/200/300?31">
            </div>
            <div class="banner-dots">
                <span class="dot active-dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
            
            <div class="title">Tendencias</div>
            <div class="row">
                <div class="card pelicula" onclick="abrirModal('Acción Total','https://picsum.photos/200/300?1','⭐ 8.5','Película de acción explosiva llena de adrenalina.')">
                    <img src="https://picsum.photos/200/300?1">
                    <p>Acción Total</p>
                </div>
                <div class="card pelicula" onclick="abrirModal('Terror Nocturno','https://picsum.photos/200/300?2','⭐ 7.2','Una noche aterradora que nadie podrá olvidar.')">
                    <img src="https://picsum.photos/200/300?2">
                    <p>Terror Nocturno</p>
                </div>
                <div class="card pelicula" onclick="abrirModal('Aventura Final','https://picsum.photos/200/300?3','⭐ 9.0','Una aventura épica alrededor del mundo.')">
                    <img src="https://picsum.photos/200/300?3">
                    <p>Aventura Final</p>
                </div>
            </div>
        </div>
    </div>

    <!-- SELECCIÓN DE GÉNEROS -->
    <div id="peliculas" class="view">
        <div class="title">🎬 Géneros</div>
        <div class="row">
            <div class="card" onclick="show('accion')">
                <img src="https://picsum.photos0">
                <p>Acción</p>
            </div>
            <div class="card" onclick="show('terror')">
                <img src="https://picsum.photos1">
                <p>Terror</p>
            </div>
            <div class="card" onclick="show('romance')">
                <img src="https://picsum.photos2">
                <p>Romance</p>
            </div>
            <div class="card" onclick="show('aventura')">
                <img src="https://picsum.photos3">
                <p>Aventura</p>
            </div>
        </div>
    </div>

    <!-- CONTENEDORES PARA CADA GÉNERO (JAVASCRIPT METE LAS COSAS AQUÍ) -->
    <div id="accion" class="view">
        <button class="btn" style="background:#333; width:auto; display:inline-block; padding:8px 16px; margin-bottom:15px;" onclick="show('peliculas')">⬅ Volver</button> 
        <div class="row" id="contenedor-accion"></div>
    </div>

    <div id="terror" class="view">
        <button class="btn" style="background:#333; width:auto; display:inline-block; padding:8px 16px; margin-bottom:15px;" onclick="show('peliculas')">⬅ Volver</button> 
        <div class="row" id="contenedor-terror"></div>
    </div>

    <div id="romance" class="view">
        <button class="btn" style="background:#333; width:auto; display:inline-block; padding:8px 16px; margin-bottom:15px;" onclick="show('peliculas')">⬅ Volver</button> 
        <div class="row" id="contenedor-romance"></div>
    </div>

    <div id="aventura" class="view">
        <button class="btn" style="background:#333; width:auto; display:inline-block; padding:8px 16px; margin-bottom:15px;" onclick="show('peliculas')">⬅ Volver</button> 
        <div class="row" id="contenedor-aventura"></div>
    </div>

    <!-- SECCIONES EXTRAS -->
    <div id="series" class="view"><div class="title">📺 Series Próximamente</div></div>
    <div id="anime" class="view"><div class="title">🎌 Anime Próximamente</div></div>
    <div id="adulto" class="view"><div class="title">🔞 Contenido +18 Protegido</div></div>

    <script>
        // 1. BASE DE DATOS
        const baseDeDatosPeliculas = [
            { titulo: 'John Wick', genero: 'accion', img: 'https://picsum.photos/200/300?10', info: '⭐ 8.5 | 🎭 Acción', desc: 'Un asesino legendario vuelve.' },
            { titulo: 'Mad Max', genero: 'accion', img: 'https://picsum.photos/200/300?11', info: '⭐ 8.8 | 🎭 Acción', desc: 'Mundo apocalíptico.' },
            { titulo: 'La Momia', genero: 'terror', img: 'https://picsum.photos/200/300?12', info: '⭐ 6.5 | 🎭 Terror', desc: 'Una maldición despierta.' },
            { titulo: 'IT', genero: 'terror', img: 'https://picsum.photos/200/300?13', info: '⭐ 7.9 | 🎭 Terror', desc: 'El payaso maldito vuelve.' },
            { titulo: 'Mi Último Regalo', genero: 'romance', img: 'https://picsum.photos/200/300?14', info: '⭐ 7.5 | 🎭 Romance', desc: 'Historia de amor verdadero.' },
            { titulo: 'Cuando Te Encuentre', genero: 'romance', img: 'https://picsum.photos/200/300?15', info: '⭐ 7.1 | 🎭 Romance', desc: 'El destino une dos almas.' },
            { titulo: 'Liberen a Willy', genero: 'aventura', img: 'https://picsum.photos/200/300?16', info: '⭐ 6.8 | 🎭 Aventura', desc: 'Un niño y una orca.' },
            { titulo: 'El Oso', genero: 'aventura', img: 'https://picsum.photos/200/300?17', info: '⭐ 8.0 | 🎭 Aventura', desc: 'Supervivencia en la naturaleza.' }
        ];

        // 2. BANNER ORIGINAL
        const imagenesBanner = [
            "https://picsum.photos/200/300?18",
            "https://picsum.photos/200/300?19",
            "https://picsum.photos/200/300?20",
            "https://picsum.photos/200/300?21",
            "https://picsum.photos/200/300?22"
        ];
        let bannerIndex = 0;
        let temporizadorBanner;

        function rotarBanner() {
            const imgElement = document.getElementById("banner-img");
            if (!imgElement) return;
            bannerIndex = (bannerIndex + 1) % imagenesBanner.length;
            imgElement.src = imagenesBanner[bannerIndex];
            
            const puntos = document.querySelectorAll(".banner-dots .dot");
            puntos.forEach((punto, idx) => {
                if (idx === bannerIndex) punto.classList.add("active-dot");
                else punto.classList.remove("active-dot");
            });
        }

        function iniciarTemporizador() {
            clearInterval(temporizadorBanner);
            temporizadorBanner = setInterval(rotarBanner, 4000);
        }

        // 3. CARGAR CATÁLOGO
        function cargarCatalogo() {
            baseDeDatosPeliculas.forEach(peli => {
                const contenedor = document.getElementById(`contenedor-${peli.genero}`);
                if (contenedor) {
                    const tarjeta = document.createElement('div');
                    tarjeta.className = 'card pelicula';
                    tarjeta.onclick = () => abrirModal(peli.titulo, peli.img, peli.info, peli.desc);
                    tarjeta.innerHTML = `
                        <img src="${peli.img}">
                        <p>${peli.titulo}</p>
                    `;
                    contenedor.appendChild(tarjeta);
                }
            });
        }

        // 4. INICIALIZADOR GENERAL
        const tg = window.Telegram?.WebApp;

        document.addEventListener("DOMContentLoaded", () => {
            cargarCatalogo();
            iniciarTemporizador();

            if (tg) {
                tg.ready();
                tg.expand();
            }

            const bannerElement = document.getElementById("banner-img");
            if (bannerElement) {
                bannerElement.addEventListener("click", () => {
                    rotarBanner();
                    iniciarTemporizador();
                    if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                });
            }
        });

        // 5. NAVEGACIÓN Y MODAL
        function show(id){
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            const targetView = document.getElementById(id);
            if(targetView) targetView.classList.add('active');
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function abrirModal(titulo, img, info, desc){
            document.getElementById("modal-title").innerText = titulo;
            document.getElementById("modal-img").src = img;
            document.getElementById("modal-info").innerText = info;
            document.getElementById("modal-desc").innerText = desc;
            document.getElementById("modal").style.display = "flex";
            if (tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
        }

        function cerrarModal(){
            document.getElementById("modal").style.display = "none";
        }

        function buscarPelicula() {
            let input = document.getElementById('buscar').value.toLowerCase();
            let tarjetas = document.querySelectorAll('.card.pelicula');
            tarjetas.forEach(tarjeta => {
                let nombre = tarjeta.querySelector('p').innerText.toLowerCase();
                tarjeta.style.display = nombre.includes(input) ? "block" : "none";
            });
        }

        function verAnuncio() {
            if (tg) tg.showAlert("▶️ Cargando video publicitario...");
            else alert("Cargando anuncio...");
        }

        function activarVip() {
            if (tg) {
                tg.showPopup({
                    title: 'Suscripción VIP',
                    message: '¿Quieres desbloquear todo el catálogo sin anuncios?',
                    buttons: [{id: 'vip', type: 'default', text: 'Obtener Cuenta VIP'}, {type: 'cancel', text: 'Luego'}]
                });
            } else {
                alert("Pase VIP Premium.");
            }
        }
    </script>
</body>
</html>
