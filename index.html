<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cine Bot</title>
    <style>
        body { margin:0; font-family:Arial,sans-serif; background:#0b0b0b; color:white; -webkit-user-select:none; user-select:none; }
        .header { display:flex; align-items:center; justify-content:space-between; padding:15px; background:#111; position:sticky; top:0; z-index:10; }
        .logo { color:#e50914; font-size:22px; font-weight:bold; }
        .menu { display:flex; gap:10px; overflow-x:auto; padding:10px; background:#0b0b0b; scrollbar-width:none; }
        .menu::-webkit-scrollbar { display:none; }
        .menu button { background:#1f1f1f; border:none; color:white; padding:10px 14px; border-radius:20px; white-space:nowrap; font-weight:bold; cursor:pointer; }
        .section { padding:15px; }
        .title { font-size:18px; margin:10px 0; color:#e5e5e5; }
        .view { display:none; padding:15px; }
        .active { display:block; }
        .row { display:flex; gap:10px; overflow-x:auto; padding-bottom:10px; }
        .card { min-width:140px; background:#1a1a1a; border-radius:10px; overflow:hidden; cursor:pointer; transition:0.2s; }
        .card:active { transform:scale(0.97); }
        .card img { width:100%; height:200px; object-fit:cover; background:#222; }
        .card p { margin:5px; font-size:13px; }
        .skeleton { background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:flex-start; overflow-y:auto; padding:20px 0; z-index:100; }
        .modal-content { background:#111; padding:15px; width:90%; max-width:400px; border-radius:12px; position:relative; text-align:center; margin:auto; }
        .close { position:absolute; right:10px; top:10px; cursor:pointer; font-size:20px; color:#aaa; }
        .btn { display:block; width:100%; background:#222; color:white; border:none; padding:12px; margin-top:10px; border-radius:8px; font-size:15px; font-weight:bold; cursor:pointer; }
        .vip { background:gold; color:black; }
        .banner-slider { width:100%; margin-bottom:15px; }
        .banner-slider img { width:100%; height:220px; object-fit:cover; border-radius:12px; background:#222; }
        .banner-dots { display:flex; justify-content:center; gap:8px; margin-top:10px; margin-bottom:15px; }
        .dot { width:10px; height:10px; border-radius:50%; background:#666; }
        .active-dot { background:white; }
        .search-box { padding:10px; background:#111; }
        .search-box input { width:100%; padding:12px; border:none; border-radius:8px; background:#222; color:white; font-size:16px; box-sizing:border-box; }
    </style>
</head>

            { titulo:'Gravity',                  tmdbQuery:'Gravity 2013',              genero:'aventura', info:'⭐ 7.7 | 🎭 Aventura | 🕒 91 min',  desc:'Dos astronautas luchan por sobrevivir en el espacio.' }
        ];

        // ─── PELÍCULAS PARA EL BANNER (títulos de tendencias) ────────────────────
        const titulosTendencias = ['Inception 2010', 'The Dark Knight 2008', 'Titanic 1997', 'Avatar 2009', 'The Avengers 2012'];
        const titulosBanner     = ['Interstellar 2014', 'Mad Max Fury Road 2015', 'La La Land 2016', 'Get Out 2017', 'Spider-Man No Way Home'];
        const titularesGenero   = { accion:'John Wick 2014', terror:'It 2017', romance:'Titanic 1997', aventura:'Avatar 2009' };

        // ─── FUNCIÓN CENTRAL: busca poster en TMDB ────────────────────────────────
        async function obtenerPoster(query) {
            if (posterCache[query]) return posterCache[query];
            try {
                const url = `${TMDB_SEARCH}?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&language=es-ES`;
                const res  = await fetch(url);
                const data = await res.json();
                const poster = data.results?.[0]?.poster_path
                    ? `${TMDB_IMG}${data.results[0].poster_path}`
                    : null;
                posterCache[query] = poster;
                return poster;
            } catch {
                return null;
            }
        }

        const PLACEHOLDER = 'https://via.placeholder.com/140x200/1a1a1a/666?text=Sin+imagen';

        // ─── BANNER ───────────────────────────────────────────────────────────────
        const bannerUrls = [];
        let bannerIndex = 0;
        let temporizadorBanner;

        async function cargarBanner() {
            for (const q of titulosBanner) {
                const p = await obtenerPoster(q);
                bannerUrls.push(p || PLACEHOLDER);
            }
            const el = document.getElementById('banner-img');
            if (el && bannerUrls[0]) {
                el.src = bannerUrls[0];
                el.classList.remove('skeleton');
            }
        }

        function rotarBanner() {
            if (!bannerUrls.length) return;
            bannerIndex = (bannerIndex + 1) % bannerUrls.length;
            const el = document.getElementById('banner-img');
            if (el) el.src = bannerUrls[bannerIndex];
            document.querySelectorAll('.banner-dots .dot').forEach((d, i) =>
                d.classList.toggle('active-dot', i === bannerIndex));
        }

        function iniciarTemporizador() {
            clearInterval(temporizadorBanner);
            temporizadorBanner = setInterval(rotarBanner, 4000);
        }

        // ─── IMÁGENES DE GÉNEROS ─────────────────────────────────────────────────
        async function cargarImagenesGenero() {
            for (const [genero, query] of Object.entries(titularesGenero)) {
                const poster = await obtenerPoster(query);
                const el = document.getElementById(`img-genero-${genero}`);
                if (el) {
                    el.src = poster || PLACEHOLDER;
                    el.classList.remove('skeleton');
                }
            }
        }

        // ─── CATÁLOGO PRINCIPAL ───────────────────────────────────────────────────
        async function cargarCatalogo() {
            // Primero dibujamos las tarjetas con skeleton
            baseDeDatosPeliculas.forEach((peli, index) => {
                const contenedor = document.getElementById(`contenedor-${peli.genero}`);
                if (!contenedor) return;
                const tarjeta = document.createElement('div');
                tarjeta.className = 'card pelicula';
                tarjeta.id = `card-${index}`;
                tarjeta.innerHTML = `<img id="img-${index}" class="skeleton" src="${PLACEHOLDER}"><p>${peli.titulo}</p>`;
                tarjeta.onclick = () => abrirModal(peli.titulo, document.getElementById(`img-${index}`).src, peli.info, peli.desc);
                contenedor.appendChild(tarjeta);
            });

            // Luego cargamos los posters en lotes de 5 para no saturar la API
            const LOTE = 5;
            for (let i = 0; i < baseDeDatosPeliculas.length; i += LOTE) {
                const lote = baseDeDatosPeliculas.slice(i, i + LOTE);
                await Promise.all(lote.map(async (peli, j) => {
                    const idx    = i + j;
                    const poster = await obtenerPoster(peli.tmdbQuery);
                    const imgEl  = document.getElementById(`img-${idx}`);
                    if (imgEl) {
                        imgEl.src = poster || PLACEHOLDER;
                        imgEl.classList.remove('skeleton');
                    }
                }));
            }
        }

        // ─── TENDENCIAS (home) ────────────────────────────────────────────────────
        async function cargarTendencias() {
            const contenedor = document.getElementById('contenedor-tendencias');
            titulosTendencias.forEach((query, i) => {
                const nombre = query.replace(/\d{4}/, '').trim();
                const tarjeta = document.createElement('div');
                tarjeta.className = 'card pelicula';
                tarjeta.id = `tend-${i}`;
                tarjeta.innerHTML = `<img id="tend-img-${i}" class="skeleton" src="${PLACEHOLDER}"><p>${nombre}</p>`;
                tarjeta.onclick = () => abrirModal(nombre, document.getElementById(`tend-img-${i}`).src, '', '');
                contenedor.appendChild(tarjeta);
            });
            await Promise.all(titulosTendencias.map(async (query, i) => {
                const poster = await obtenerPoster(query);
                const el = document.getElementById(`tend-img-${i}`);
                if (el) { el.src = poster || PLACEHOLDER; el.classList.remove('skeleton'); }
            }));
        }

        // ─── INIT ─────────────────────────────────────────────────────────────────
        const tg = window.Telegram?.WebApp;

        document.addEventListener('DOMContentLoaded', async () => {
            if (tg) { tg.ready(); tg.expand(); }

            // Cargamos todo en paralelo
            cargarBanner();
            cargarImagenesGenero();
            cargarTendencias();
            cargarCatalogo();
            iniciarTemporizador();

            document.getElementById('banner-img').addEventListener('click', () => {
                rotarBanner(); iniciarTemporizador();
            });
        });

        // ─── NAV & MODAL ──────────────────────────────────────────────────────────
        function show(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            const t = document.getElementById(id);
            if (t) t.classList.add('active');
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function abrirModal(titulo, img, info, desc) {
            document.getElementById('modal-title').innerText = titulo;
            document.getElementById('modal-img').src = img;
            document.getElementById('modal-info').innerText = info;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal').style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function buscarPelicula() {
            const input = document.getElementById('buscar').value.toLowerCase();
            document.querySelectorAll('.card.pelicula').forEach(card => {
                const nombre = card.querySelector('p').innerText.toLowerCase();
                card.style.display = nombre.includes(input) ? 'block' : 'none';
            });
        }

        function verAnuncio() {
            if (tg) tg.showAlert('▶️ Cargando video publicitario...');
            else alert('Cargando anuncio...');
        }

        function activarVip() {
            if (tg) {
                tg.showPopup({ title:'Suscripción VIP', message:'¿Quieres desbloquear todo el catálogo sin anuncios?',
                    buttons:[{id:'vip',type:'default',text:'Obtener Cuenta VIP'},{type:'cancel',text:'Luego'}] });
            } else { alert('Pase VIP Premium.'); }
        }
    </script>
</body>
</html>
