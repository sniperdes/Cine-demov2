<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cine Demo</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

/* HEADER */
.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px;
background:#111;
position:sticky;
top:0;
}

.logo{
color:#e50914;
font-size:22px;
font-weight:bold;
}

/* MENU */
.menu{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
background:#0b0b0b;
}

.menu button{
background:#1f1f1f;
border:none;
color:white;
padding:10px 14px;
border-radius:20px;
white-space:nowrap;
}

/* HOME */
.section{
padding:15px;
}

.title{
font-size:18px;
margin:10px 0;
color:#e5e5e5;
}

/* CARDS */
.row{
display:flex;
gap:10px;
overflow-x:auto;
padding-bottom:10px;
}

.card{
min-width:140px;
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}
.card:hover{
transform:scale(1.03);
  }

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card p{
margin:5px;
font-size:13px;
}

/* VISTAS */
.view{
display:none;
padding:15px;
}

.active{
display:block;
}
  .modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-content{
background:#111;
padding:15px;
width:90%;
max-width:400px;
border-radius:12px;
position:relative;
}

.close{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
font-size:20px;
}

.vip{
background:gold;
color:black;
margin-top:10px;
}
</style>
</head>

<body>
  <!-- MODAL FICHA -->
<div id="modal" class="modal">

  <div class="modal-content">

    <span class="close" onclick="cerrarModal()">✖</span>

    <h2 id="modal-title">Título</h2>

<img id="modal-img" src="" style="width:100%; border-radius:10px;">

<p id="modal-info">⭐ 8.5 | 🎭 Acción | 🕒 120 min</p>

<p id="modal-desc">Descripción de la película</p>
    <button class="btn" onclick="verAnuncio()">📺 Ver con anuncios</button>
    <button class="btn vip">💎 VIP</button>
    <button class="btn" onclick="cerrarModal()">⬅ Volver</button>

  </div>

</div>

<div class="header">
<div class="logo">CINE DEMO</div>
</div>

<!-- MENU -->
<div class="menu">
<button onclick="show('home')">🏠 Inicio</button>
<button onclick="show('peliculas')">🎬 Películas</button>
<button onclick="show('series')">📺 Series</button>
<button onclick="show('anime')">🎌 Anime</button>
<button onclick="show('adulto')">🔞 +18</button>
</div>

<!-- HOME -->
<div id="home" class="view active">
<div class="section">

<div class="title">🔥 Destacadas</div>
  
  <div class="banner-slider">
  <img id="banner-img" src="https://picsum.photos/800/400?20">
  </div>

<div class="row">

<div class="card"
onclick="abrirModal(
'Acción Total',
'https://picsum.photos/200/300?1',
'⭐ 8.5 | 🎭 Acción | 🕒 120 min',
'Película de acción explosiva llena de adrenalina.'
)">
<img src="https://picsum.photos/200/300?1">
<p>Acción Total</p>
</div>

<div class="card" onclick="abrirModal('Terror Nocturno','https://picsum.photos/200/300?2','Una noche aterradora que nadie podrá olvidar.')">
<img src="https://picsum.photos/200/300?2">
<p>Terror Nocturno</p>
</div>

<div class="card" onclick="abrirModal('Aventura Final','https://picsum.photos/200/300?3','Una aventura épica alrededor del mundo.')">
<img src="https://picsum.photos/200/300?3">
<p>Aventura Final</p>
</div>

</div>

</div>
</div>

<!-- PELICULAS -->
<div id="peliculas" class="view">

<div class="title">🎬 Géneros</div>

<div class="row">

<div class="card">
<img src="https://picsum.photos/200/300?10">
<p>Acción</p>
</div>

<div class="card">
<img src="https://picsum.photos/200/300?11">
<p>Terror</p>
</div>

<div class="card">
<img src="https://picsum.photos/200/300?12">
<p>Romance</p>
</div>

<div class="card">
<img src="https://picsum.photos/200/300?13">
<p>Aventura</p>
</div>

</div>

</div>

<!-- SERIES -->
<div id="series" class="view">
<div class="title">📺 Series</div>
</div>

<!-- ANIME -->
<div id="anime" class="view">
<div class="title">🎌 Anime</div>
</div>

<!-- +18 -->
<div id="adulto" class="view">
<div class="title">🔞 Contenido +18</div>
</div>

<script>
function show(id){

document.querySelectorAll('.view')
.forEach(v => v.classList.remove('active'));

document.getElementById(id).classList.add('active');

}
  function abrirModal(titulo, img, info, desc){

document.getElementById("modal-title").innerText = titulo;
document.getElementById("modal-img").src = img;
document.getElementById("modal-info").innerText = info;
document.getElementById("modal-desc").innerText = desc;

document.getElementById("modal").style.display = "flex";

}
function cerrarModal(){
document.getElementById("modal").style.display = "none";
}

function verAnuncio(){
alert("📺 Simulando anuncio...");
}
  
</script>

</body>
</html>
