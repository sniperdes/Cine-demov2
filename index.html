<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Pelis Prueba</title>
    <style>
        body { background: #111; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 10px; }
        .banner { width: 100%; height: 180px; background: #222; border-radius: 10px; overflow: hidden; position: relative; }
        .banner img { width: 100%; height: 100%; object-fit: cover; }
        .banner-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
        .dot { width: 8px; height: 8px; background: rgba(255,255,255,0.5); border-radius: 50%; }
        .active-dot { background: #fff; }
        .grid { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .card { min-width: 110px; background: #222; border-radius: 8px; overflow: hidden; text-align: center; cursor: pointer; }
        .card img { width: 110px; height: 165px; object-fit: cover; background: #333; }
        .card p { font-size: 12px; margin: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:100; }
        .modal-content { background:#222; padding:20px; border-radius:15px; width:90%; max-width:400px; }
    </style>
</head>
<body>

    <!-- BANNER -->
    <div class="banner">
        <img id="banner-img" src="https://picsum.photos" alt="Banner">
        <div class="banner-dots">
            <div class="dot active-dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <h3>Películas de Acción</h3>
    <!-- CONTENEDOR HTML -->
    <div id="contenedor-accion" class="grid"></div>

    <!-- MODAL REPARADO CON TU IFRAME -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <img id="modal-img" src="" style="width:100%; border-radius:10px;">
            <iframe id="modal-video" src="" style="width: 100%; aspect-ratio: 16/9; border: none; border-radius: 10px; display: none;" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            <p id="modal-info"></p>
            <p id="modal-desc"></p>
            <button onclick="reproducirVideo('trailer')">Ver Tráiler</button>
            <button onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>

    <script>
        // 1. BASE DE DATOS LOCAL CON PUENTE SEGURO DE IMÁGENES (images.weserv.nl)
        const baseDeDatosPeliculas = [
            { 
                titulo: 'Mad Max: Fury Road', genero: 'accion', 
                img: 'https://weserv.nl', 
                info: '⭐ 81% | 🕒 2h 00m', desc: 'En un futuro post-apocalíptico, Max se une a Furiosa para escapar de un tirano a través del desierto.',
                trailer: 'https://youtu.be', peliculaUrl: 'https://tu-servidor-de-video.com' 
            },
            { 
                titulo: 'Gladiador', genero: 'accion', 
                img: 'https://weserv.nl', 
                info: '⭐ 85% | 🕒 2h 35m', desc: 'El general romano Máximo es traicionado por el heredero al trono y regresa como gladiador para buscar venganza.',
                trailer: 'https://youtu.be', peliculaUrl: 'https://tu-servidor-de-video.com' 
            },
            { 
                titulo: 'Misión Imposible', genero: 'accion', 
                img: 'https://weserv.nl', 
                info: '⭐ 77% | 🕒 1h 50m', desc: 'El agente de inteligencia Ethan Hunt es acusado falsamente de espionaje y debe huir para limpiar su nombre.',
                trailer: 'https://youtu.be', peliculaUrl: 'https://tu-servidor-de-video.com' 
            }
        ];

        // 2. LÓGICA DEL BANNER
        const imagenesBanner = ["https://picsum.photos", "https://picsum.photos", "https://picsum.photos"];
        let bannerIndex = 0;
        function rotarBanner() {
            const imgElement = document.getElementById("banner-img");
            if (!imgElement) return;
            bannerIndex = (bannerIndex + 1) % imagenesBanner.length;
            imgElement.src = imagenesBanner[bannerIndex];
        }
        setInterval(rotarBanner, 4000);

        // 3. CARGAR CATÁLOGO (Limpio y directo)
        async function cargarCatalogo() {
    try {
        const respuesta = await fetch('/peliculas');
        const baseDeDatosPeliculas = await respuesta.json();

        baseDeDatosPeliculas.forEach(peli => {
            const contenedor = document.getElementById(`contenedor-${peli.genero}`);
            if (contenedor) {
                const tarjeta = document.createElement('div');
                tarjeta.className = 'card pelicula';
                tarjeta.onclick = () => abrirModal(peli.titulo, peli.img, peli.info, peli.desc, peli.trailer, peli.peliculaUrl);
                tarjeta.innerHTML = `<img src="${peli.img}"><p>${peli.titulo}</p>`;
                contenedor.appendChild(tarjeta);
            }
        });
    } catch (error) { console.error("Error cargando catálogo:", error); }
}


        // 5. NAVEGACIÓN Y MODAL (Tu extractor reparado al principio)
        let trailerActual = "";
        let peliculaActual = "";

        function abrirModal(titulo, img, info, desc, trailerUrl, peliculaUrl){
            document.getElementById("modal-title").innerText = titulo;
            document.getElementById("modal-img").src = img;
            document.getElementById("modal-info").innerText = info;
            document.getElementById("modal-desc").innerText = desc;
            
            document.getElementById("modal-video").style.display = "none";
            document.getElementById("modal-video").src = "";
            document.getElementById("modal-img").style.display = "block";
            
            let videoId = null;
            if (trailerUrl && trailerUrl.includes("watch?v=")) videoId = trailerUrl.split("v=")[1].split("&")[0];
            else if (trailerUrl && trailerUrl.includes("youtu.be/")) videoId = trailerUrl.split("youtu.be/")[1].split("?")[0];

            if (videoId) trailerActual = "https://youtube.com" + videoId + "?autoplay=1&rel=0";
            else trailerActual = trailerUrl || "";
            
            peliculaActual = peliculaUrl || "";
            document.getElementById("modal").style.display = "flex";
        }

        function cerrarModal(){
            document.getElementById("modal-video").src = "";
            document.getElementById("modal").style.display = "none";
        }

        function reproducirVideo(tipo) {
            if (tipo === 'trailer' && trailerActual) {
                document.getElementById("modal-img").style.display = "none";
                document.getElementById("modal-video").style.display = "block";
                document.getElementById("modal-video").src = trailerActual;
            }
        }

        document.addEventListener("DOMContentLoaded", cargarCatalogo);
    </script>
</body>
</html>
