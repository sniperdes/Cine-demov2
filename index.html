<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cine Bot</title>

    <!-- SDK Oficial de Telegram Mini Apps -->
    <script src="https://telegram.org"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0b0b;
            color: white;
            -webkit-user-select: none;
            user-select: none;
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #111;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            color: #e50914;
            font-size: 22px;
            font-weight: bold;
        }
          
        /* MENU */
        .menu {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px;
            background: #0b0b0b;
            scrollbar-width: none;
        }
        .menu::-webkit-scrollbar {
            display: none;
        }

        .menu button {
            background: #1f1f1f;
            border: none;
            color: white;
            padding: 10px 14px;
            border-radius: 20px;
            white-space: nowrap;
            font-weight: bold;
            cursor: pointer;
        }

        /* SECCIONES Y VISTAS */
        .section {
            padding: 15px;
        }

        .title {
            font-size: 18px;
            margin: 10px 0;
            color: #e5e5e5;
        }

        .view {
            display: none;
            padding: 15px;
        }

        .active {
            display: block;
        }

        /* CARDS */
        .row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .card {
            min-width: 140px;
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
        }
        .card:active {
            transform: scale(0.97);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card p {
            margin: 5px;
            font-size: 13px;
        }

     /* MODAL CORREGIDO PARA MÓVILES */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: flex-start; /* Cambiado de center a flex-start para que empiece arriba */
            overflow-y: auto;        /* Permite scroll general si la pantalla es muy chica */
            padding: 20px 0;         /* Margen arriba y abajo para que respire */
            z-index: 100;
        }

        .modal-content {
            background: #111;
            padding: 15px;
            width: 90%;
            max-width: 400px;
            border-radius: 12px;
            position: relative;
            text-align: center;
            margin: auto;            /* Centra la tarjeta horizontalmente */
        }


        .close {
            position: absolute;
            right: 10px;
            top: 10px;
            cursor: pointer;
            font-size: 20px;
            color: #aaa;
        }

        .btn {
            display: block;
            width: 100%;
            background: #222;
            color: white;
            border: none;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .vip {
            background: gold;
            color: black;
        }

        /* BANNERS */
        .banner-slider {
            width: 100%;
            margin-bottom: 15px;
        }

        .banner-slider img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
        }

        .banner-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #666;
        }

        .active-dot {
            background: white;
        }

        /* BUSCADOR */
        .search-box {
            padding: 10px;
            background: #111;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #222;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

        <!-- MODAL FICHA DETALLES CON REPRODUCTOR INTEGRADO -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">✖</span>
            <h2 id="modal-title">Título</h2>
            
            <!-- La carátula se ocultará cuando se le dé play al video -->
            <img id="modal-img" src="" style="width:100%; border-radius:10px; display: block;">
            
            <!-- REPRODUCTOR INTEGRADO (Oculto al inicio) -->
            <iframe id="modal-video" src="" style="width: 100%; aspect-ratio: 16/9; border: none; border-radius: 10px; display: none;" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>

            <p id="modal-info" style="color: gold; font-weight: bold; margin: 10px 0;">⭐ Info</p>
            <p id="modal-desc" style="font-size: 14px; color: #ccc;">Descripción</p>
            
            <button class="btn" style="background: #e50914;" onclick="reproducirVideo('pelicula')">📺 Ver Película (Con Anuncios)</button>
            <button class="btn" style="background: #333;" onclick="reproducirVideo('trailer')">▶ Reproducir Tráiler Aquí</button>
            <button class="btn vip" onclick="activarVip()">💎 VIP Sin Anuncios</button>
            <button class="btn btn-volver" onclick="cerrarModal()">⬅ Volver</button>
        </div>
    </div>


    <!-- HEADER -->
    <div class="header">
        <div class="logo">CINE DEMO</div>
    </div>

    <!-- BUSCADOR -->
    <div class="search-box">
        <input type="text" id="buscar" placeholder="🔍 Buscar película..." onkeyup="buscarPelicula()">
    </div>

    <!-- MENU PRINCIPAL -->
    <div class="menu">
        <button onclick="show('home')">🏠 Inicio</button>
        <button onclick="show('peliculas')">🎬 Películas</button>
        <button onclick="show('series')">📺 Series</button>
        <button onclick="show('anime')">🎌 Anime</button>
        <button onclick="show('adulto')">🔞 +18</button>
    </div>

    <!-- HOME (INICIO) -->
    <div id="home" class="view active">
        <div class="section">
            <div class="title">🔥 Destacadas</div>
            <div class="banner-slider">
                <img id="banner-img" src="https://picsum.photos/200/300?31">
            </div>
            <div class="banner-dots">
                <span class="dot active-dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
            
            <div class="title">Tendencias</div>
            <div class="row">
                <div class="card pelicula" onclick="abrirModal('Acción Total','https://picsum.photos/200/300?1','⭐ 8.5','Película de acción explosiva llena de adrenalina.')">
                    <img src="https://picsum.photos/200/300?33">
                    <p>Acción Total</p>
                </div>
                <div class="card pelicula" onclick="abrirModal('Terror Nocturno','https://picsum.photos/200/300?2','⭐ 7.2','Una noche aterradora que nadie podrá olvidar.')">
                    <img src="https://picsum.photos/200/300?34">
                    <p>Terror Nocturno</p>
                </div>
                <div class="card pelicula" onclick="abrirModal('Aventura Final','https://picsum.photos/200/300?3','⭐ 9.0','Una aventura épica alrededor del mundo.')">
                    <img src="https://picsum.photos/200/300?35">
                    <p>Aventura Final</p>
                </div>
            </div>
        </div>
    </div>

    <!-- SELECCIÓN DE GÉNEROS -->
    <div id="peliculas" class="view">
        <div class="title">🎬 Géneros</div>
        <div class="row">
            <div class="card" onclick="show('accion')">
                <img src="https://picsum.photos/200/300?36">
                <p>Acción</p>
            </div>
            <div class="card" onclick="show('terror')">
                <img src="https://picsum.photos/200/300?37">
                <p>Terror</p>
            </div>
            <div class="card" onclick="show('romance')">
                <img src="https://picsum.photos/200/300?38">
                <p>Romance</p>
            </div>
            <div class="card" onclick="show('aventura')">
                <img src="https://picsum.photos/200/300?39">
                <p>Aventura</p>
            </div>
        </div>
    </div>

    <!-- CONTENEDORES PARA CADA GÉNERO (JAVASCRIPT METE LAS COSAS AQUÍ) -->
    <div id="accion" class="view">
        <button class="btn" style="background:#333; width:auto; display:inline-block; padding:8px 16px; margin-bottom:15px;" onclick="show('peliculas')">⬅ Volver</button> 
        <div class="row" id="contenedor-accion"></div>
    </div>

    <div id="terror" class="view">
        <button class="btn" style="background:#333; width:auto; display:inline-block; padding:8px 16px; margin-bottom:15px;" onclick="show('peliculas')">⬅ Volver</button> 
        <div class="row" id="contenedor-terror"></div>
    </div>

    <div id="romance" class="view">
        <button class="btn" style="background:#333; width:auto; display:inline-block; padding:8px 16px; margin-bottom:15px;" onclick="show('peliculas')">⬅ Volver</button> 
        <div class="row" id="contenedor-romance"></div>
    </div>

    <div id="aventura" class="view">
        <button class="btn" style="background:#333; width:auto; display:inline-block; padding:8px 16px; margin-bottom:15px;" onclick="show('peliculas')">⬅ Volver</button> 
        <div class="row" id="contenedor-aventura"></div>
    </div>

    <!-- SECCIONES EXTRAS -->
    <div id="series" class="view"><div class="title">📺 Series Próximamente</div></div>
    <div id="anime" class="view"><div class="title">🎌 Anime Próximamente</div></div>
    <div id="adulto" class="view"><div class="title">🔞 Contenido +18 Protegido</div></div>

    <script>

                
// Tu lista original simplificada (¡ya no necesitas poner los links de las imágenes a mano!)
 
       // 1. BASE DE DATOS SIMPLIFICADA (¡Sin links manuales de fotos!)
const baseDeDatosPeliculas = [
    { titulo: 'Mad Max: Fury Road', genero: 'accion', info: '⭐ 8.8', desc: 'Mundo apocalíptico.', trailer: 'https://youtu.be', peliculaUrl: 'https://tu-servidor-de-video.com' },
    { titulo: 'Gladiador', genero: 'accion', info: '⭐ 8.5', desc: 'Venganza en Roma.', trailer: 'https://youtu.be', peliculaUrl: 'https://tu-servidor-de-video.com' },
    { titulo: 'Misión Imposible', genero: 'accion', info: '⭐ 7.8', desc: 'Acción y espionaje.', trailer: 'https://youtu.be', peliculaUrl: 'https://tu-servidor-de-video.com' },
    { titulo: 'Terminator 2', genero: 'accion', info: '⭐ 8.6', desc: 'El juicio final.', trailer: 'https://youtu.be', peliculaUrl: 'https://tu-servidor-de-video.com' },
    { titulo: 'Batman: El Caballero', genero: 'accion', info: '⭐ 9.0', desc: 'Héroe de Gotham.', trailer: 'https://youtu.be', peliculaUrl: 'https://tu-servidor-de-video.com' },
    { titulo: 'Duro de Matar', genero: 'accion', info: '⭐ 8.2', desc: 'John McClane contra terroristas.', trailer: 'https://youtu.be', peliculaUrl: 'https://tu-servidor-de-video.com' },
    { titulo: 'Búsqueda Implacable', genero: 'accion', info: '⭐ 7.8', desc: 'Un padre rescata a su hija.', trailer: 'https://youtu.be', peliculaUrl: 'https://tu-servidor-de-video.com' },
    { titulo: 'Rápidos y Furiosos', genero: 'accion', info: '⭐ 6.8', desc: 'Carreras y acción.', trailer: 'https://youtu.be', peliculaUrl: 'https://tu-servidor-de-video.com' },
    { titulo: 'Matrix', genero: 'accion', info: '⭐ 8.7', desc: 'La realidad es una simulación.', trailer: 'https://youtu.be', peliculaUrl: 'https://tu-servidor-de-video.com' },
    { titulo: 'Top Gun: Maverick', genero: 'accion', info: '⭐ 8.3', desc: 'Aviones de combate.', trailer: 'https://youtu.be', peliculaUrl: 'https://tu-servidor-de-video.com' },
    { titulo: '300', genero: 'accion', info: '⭐ 7.6', desc: 'Espartanos en batalla.', trailer: 'https://youtu.be', peliculaUrl: 'https://tu-servidor-de-video.com' },
    { titulo: 'Kill Bill Vol. 1', genero: 'accion', info: '⭐ 8.2', desc: 'Venganza samurái.', trailer: 'https://youtu.be', peliculaUrl: 'https://tu-servidor-de-video.com' },
    { titulo: 'Inception', genero: 'accion', info: '⭐ 8.8', desc: 'Robo dentro de los sueños.', trailer: 'https://youtu.be', peliculaUrl: 'https://tu-servidor-de-video.com' },
    { titulo: 'Deadpool', genero: 'accion', info: '⭐ 8.0', desc: 'Antihéroe cómico.', trailer: 'https://youtu.be', peliculaUrl: 'https://tu-servidor-de-video.com' },
    { titulo: 'Logan', genero: 'accion', info: '⭐ 8.1', desc: 'El final de Wolverine.', trailer: 'https://youtu.be', peliculaUrl: 'https://tu-servidor-de-video.com' },
    { titulo: 'Spider-Man: No Way Home', genero: 'accion', info: '⭐ 8.2', desc: 'Multiverso arácnido.', trailer: 'https://youtu.be', peliculaUrl: 'https://tu-servidor-de-video.com' },
    { titulo: 'Skyfall', genero: 'accion', info: '⭐ 7.8', desc: 'James Bond regresa.', trailer: 'https://youtu.be', peliculaUrl: 'https://tu-servidor-de-video.com' },
    { titulo: 'The Avengers', genero: 'accion', info: '⭐ 8.0', desc: 'Héroes unidos.', trailer: 'https://youtu.be', peliculaUrl: 'https://tu-servidor-de-video.com' },
    { titulo: 'Ip Man', genero: 'accion', info: '⭐ 8.0', desc: 'Maestro de artes marciales.', trailer: 'https://youtu.be', peliculaUrl: 'https://tu-servidor-de-video.com' }
];

// Tu clave API personal de TMDB
const MI_API_KEY = "acd65342b986ff7dad902ea7412fc003"; 

// 2. BANNER ORIGINAL
const imagenesBanner = [
    "https://picsum.photos",
    "https://picsum.photos",
    "https://picsum.photos",
    "https://picsum.photos",
    "https://picsum.photos"
];
let bannerIndex = 0;
let temporizadorBanner;

function rotarBanner() {
    const imgElement = document.getElementById("banner-img");
    if (!imgElement) return;
    bannerIndex = (bannerIndex + 1) % imagenesBanner.length;
    imgElement.src = imagenesBanner[bannerIndex];
    
    const puntos = document.querySelectorAll(".banner-dots .dot");
    puntos.forEach((punto, idx) => {
        if (idx === bannerIndex) punto.classList.add("active-dot");
        else punto.classList.remove("active-dot");
    });
}

function iniciarTemporizador() {
    clearInterval(temporizadorBanner);
    temporizadorBanner = setInterval(rotarBanner, 4000);
}

// 3. CARGAR CATÁLOGO (CORREGIDO Y OPTIMIZADO)
function cargarCatalogo() {
    baseDeDatosPeliculas.forEach((peli, index) => {
        const contenedor = document.getElementById(`contenedor-${peli.genero}`);
        if (contenedor) {
            // Creamos un ID único para la imagen de esta tarjeta
            const idImagenTarjeta = `img-peli-${index}`;
            
            // Imagen temporal de carga mientras se consulta la API
            peli.img = 'https://placeholder.com...';

            const tarjeta = document.createElement('div');
            tarjeta.className = 'card pelicula';
            
            // Evento click dinámico (siempre leerá los datos actualizados tras la llamada a la API)
            tarjeta.onclick = () => abrirModal(peli.titulo, peli.img, peli.info, peli.desc, peli.trailer, peli.peliculaUrl);
            tarjeta.innerHTML = `
                <img id="${idImagenTarjeta}" src="${peli.img}">
                <p>${peli.titulo}</p>
            `;
            contenedor.appendChild(tarjeta);

            // Buscamos de forma asíncrona la portada real en segundo plano sin congelar la app
            buscarPortadaEnTMDB(peli, idImagenTarjeta);
        }
    });
}

// FUNCIÓN AUXILIAR: Se ejecuta individualmente por cada película en segundo plano
async function buscarPortadaEnTMDB(peli, idElementoImg) {
    try {
        const query = encodeURIComponent(peli.titulo);
        const respuesta = await fetch(`https://themoviedb.org{MI_API_KEY}&query=${query}&language=es-MX`);
        const datos = await respuesta.json();
        
        // CORREGIDO: Verificación estricta del primer resultado del arreglo [0]
        if (datos.results && datos.results.length > 0) {
            const pi = datos.results[0]; 
            
            if (pi.poster_path) {
                peli.img = `https://tmdb.org{pi.poster_path}`;
                
                // Actualizamos visualmente la imagen en la tarjeta correspondiente
                const imgHTML = document.getElementById(idElementoImg);
                if (imgHTML) imgHTML.src = peli.img;
            }
            
            // Actualizamos la sinopsis oficial para cuando se abra el modal
            if (pi.overview) peli.desc = pi.overview;
        }
    } catch (error) {
        console.error("Error cargando portada de:", peli.titulo, error);
    }
}

// 4. INICIALIZADOR GENERAL
const tg = window.Telegram?.WebApp;

document.addEventListener("DOMContentLoaded", () => {
    cargarCatalogo();
    iniciarTemporizador();

    if (tg) {
        tg.ready();
        tg.expand();
    }

    const bannerElement = document.getElementById("banner-img");
    if (bannerElement) {
        bannerElement.addEventListener("click", () => {
            rotarBanner();
            iniciarTemporizador();
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        });
    }
});
    
        // 5. NAVEGACIÓN Y MODAL
        function show(id){
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            const targetView = document.getElementById(id);
            if(targetView) targetView.classList.add('active');
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

// Variables globales para guardar los enlaces de la película que se abra (¡Agrega esto!)
        let trailerActual = "";
        let peliculaActual = "";

function abrirModal(titulo, img, info, desc, trailerUrl, peliculaUrl){
    document.getElementById("modal-title").innerText = titulo;
    document.getElementById("modal-img").src = img;
    document.getElementById("modal-info").innerText = info;
    document.getElementById("modal-desc").innerText = desc;
    
    // Aseguramos que el video inicie oculto y la imagen visible
    document.getElementById("modal-video").style.display = "none";
    document.getElementById("modal-video").src = "";
    document.getElementById("modal-img").style.display = "block";
    
    // Extractor robusto para CUALQUIER link de YouTube (watch, youtu.be, shorts)
    let videoId = null;
    if (trailerUrl) {
        if (trailerUrl.includes("watch?v=")) {
            videoId = trailerUrl.split("v=")[1].split("&")[0];
        } else if (trailerUrl.includes("youtu.be/")) {
            videoId = trailerUrl.split("youtu.be/")[1].split("?")[0];
        } else if (trailerUrl.includes("/shorts/")) {
            videoId = trailerUrl.split("/shorts/")[1].split("?")[0];
        }
    }

    // Si encontramos el ID, creamos el enlace incrustado (embed) definitivo
    if (videoId) {
        trailerActual = "https://www.youtube.com/embed/" + videoId + "?autoplay=1&rel=0&modestbranding=1";
    } else {
        // Si ya venía en formato embed o es otro tipo de enlace externo
        trailerActual = trailerUrl || "";
    }
    
    peliculaActual = peliculaUrl || "";
    
    document.getElementById("modal").style.display = "flex";
    if (window.tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
}


        function cerrarModal(){
            // Apaga el video al cerrar el modal para que no siga sonando de fondo
            document.getElementById("modal-video").src = "";
            document.getElementById("modal").style.display = "none";
        }

        function reproducirVideo(tipo) {
            if (tipo === 'trailer') {
                if (trailerActual) {
                    // Oculta la foto de portada, muestra el reproductor y le da play adentro
                    document.getElementById("modal-img").style.display = "none";
                    document.getElementById("modal-video").style.display = "block";
                    document.getElementById("modal-video").src = trailerActual;
                } else {
                    if (tg) tg.showAlert("Tráiler no disponible.");
                    else alert("Tráiler no disponible.");
                }
            } else {
                // Para la película completa (que irá con tus anuncios), mantenemos el openLink externo
                if (peliculaActual) {
                    if (tg) tg.openLink(peliculaActual);
                    else window.open(peliculaActual, '_blank');
                } else {
                    if (tg) tg.showAlert("⚠️ Película próximamente disponible.");
                    else alert("Contenido no disponible todavía.");
                }
            }
        }


        function verAnuncio() {
            if (tg) tg.showAlert("▶️ Cargando video publicitario...");
            else alert("Cargando anuncio...");
        }

        function activarVip() {
            if (tg) {
                tg.showPopup({
                    title: 'Suscripción VIP',
                    message: '¿Quieres desbloquear todo el catálogo sin anuncios?',
                    buttons: [{id: 'vip', type: 'default', text: 'Obtener Cuenta VIP'}, {type: 'cancel', text: 'Luego'}]
                });
            } else {
                alert("Pase VIP Premium.");
            }
        }
    </script>
</body>
</html>
