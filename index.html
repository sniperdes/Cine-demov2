        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0b0b;
            color: white;
            -webkit-user-select: none;
            user-select: none;
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #111;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            color: #e50914;
            font-size: 22px;
            font-weight: bold;
        }
          
        /* MENU */
        .menu {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px;
            background: #0b0b0b;
            scrollbar-width: none;
        }
        .menu::-webkit-scrollbar {
            display: none;
        }

        .menu button {
            background: #1f1f1f;
            border: none;
            color: white;
            padding: 10px 14px;
            border-radius: 20px;
            white-space: nowrap;
            font-weight: bold;
            cursor: pointer;
        }

        /* SECCIONES Y VISTAS */
        .section {
            padding: 15px;
        }

        .title {
            font-size: 18px;
            margin: 10px 0;
            color: #e5e5e5;
        }

        .view {
            display: none;
            padding: 15px;
        }

        .active {
            display: block;
        }

        /* CARDS */
        .row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .card {
            min-width: 140px;
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
        }
        .card:active {
            transform: scale(0.97);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card p {
            margin: 5px;
            font-size: 13px;
        }

     /* MODAL CORREGIDO PARA MÓVILES */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: flex-start; /* Cambiado de center a flex-start para que empiece arriba */
            overflow-y: auto;        /* Permite scroll general si la pantalla es muy chica */
            padding: 20px 0;         /* Margen arriba y abajo para que respire */
            z-index: 100;
        }

        .modal-content {
            background: #111;
            padding: 15px;
            width: 90%;
            max-width: 400px;
            border-radius: 12px;
            position: relative;
            text-align: center;
            margin: auto;            /* Centra la tarjeta horizontalmente */
        }


        .close {
            position: absolute;
            right: 10px;
            top: 10px;
            cursor: pointer;
            font-size: 20px;
            color: #aaa;
        }

        .btn {
            display: block;
            width: 100%;
            background: #222;
            color: white;
            border: none;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .vip {
            background: gold;
            color: black;
        }

        /* BANNERS */
        .banner-slider {
            width: 100%;
            margin-bottom: 15px;
        }

        .banner-slider img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
        }

        .banner-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #666;
        }

        .active-dot {
            background: white;
        }

        /* BUSCADOR */
        .search-box {
            padding: 10px;
            background: #111;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #222;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

</head>

        ];
        let bannerIndex = 0;
        let temporizadorBanner;

        function rotarBanner() {
            const imgElement = document.getElementById("banner-img");
            if (!imgElement) return;
            bannerIndex = (bannerIndex + 1) % imagenesBanner.length;
            imgElement.src = imagenesBanner[bannerIndex];
            
            const puntos = document.querySelectorAll(".banner-dots .dot");
            puntos.forEach((punto, idx) => {
                if (idx === bannerIndex) punto.classList.add("active-dot");
                else punto.classList.remove("active-dot");
            });
        }

        function iniciarTemporizador() {
            clearInterval(temporizadorBanner);
            temporizadorBanner = setInterval(rotarBanner, 4000);
        }

        // 3. CARGAR CATÁLOGO
        function cargarCatalogo() {
            baseDeDatosPeliculas.forEach(peli => {
                const contenedor = document.getElementById(`contenedor-${peli.genero}`);
                if (contenedor) {
                    const tarjeta = document.createElement('div');
                    tarjeta.className = 'card pelicula';
                    tarjeta.onclick = () => abrirModal(peli.titulo, peli.img, peli.info, peli.desc, peli.trailer, peli.peliculaUrl);
                    tarjeta.innerHTML = `
                        <img src="${peli.img}">
                        <p>${peli.titulo}</p>
                    `;
                    contenedor.appendChild(tarjeta);
                }
            });
        }

        // 4. INICIALIZADOR GENERAL
        const tg = window.Telegram?.WebApp;

        document.addEventListener("DOMContentLoaded", () => {
            cargarCatalogo();
            iniciarTemporizador();

            if (tg) {
                tg.ready();
                tg.expand();
            }

            const bannerElement = document.getElementById("banner-img");
            if (bannerElement) {
                bannerElement.addEventListener("click", () => {
                    rotarBanner();
                    iniciarTemporizador();
                    if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                });
            }
        });

        // 5. NAVEGACIÓN Y MODAL
        function show(id){
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            const targetView = document.getElementById(id);
            if(targetView) targetView.classList.add('active');
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

                // Variables globales para guardar los enlaces de la película que se abra (¡Agrega esto!)
        let trailerActual = "";
        let peliculaActual = "";

        // REEMPLAZADO: Ahora recibe los dos parámetros de video al final
        function abrirModal(titulo, img, info, desc, trailerUrl, peliculaUrl){
            document.getElementById("modal-title").innerText = titulo;
            document.getElementById("modal-img").src = img;
            document.getElementById("modal-info").innerText = info;
            document.getElementById("modal-desc").innerText = desc;
            
            // Guardamos ambos enlaces en las variables globales
            trailerActual = trailerUrl || "";
            peliculaActual = peliculaUrl || "";
            
            document.getElementById("modal").style.display = "flex";
            if (tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
        }

        // SE QUEDA IGUAL (Tu código original)
        function cerrarModal(){
            document.getElementById("modal").style.display = "none";
        }

        // SE QUEDA IGUAL (Tu código original)
        function buscarPelicula() {
            let input = document.getElementById('buscar').value.toLowerCase();
            let tarjetas = document.querySelectorAll('.card.pelicula');
            tarjetas.forEach(tarjeta => {
                let nombre = tarjeta.querySelector('p').innerText.toLowerCase();
                tarjeta.style.display = nombre.includes(input) ? "block" : "none";
            });
        }

        // NUEVO: Agrega esta función inmediatamente abajo para procesar los clics de los botones
        function reproducirVideo(tipo) {
            let urlDestino = (tipo === 'pelicula') ? peliculaActual : trailerActual;

            if (urlDestino) {
                if (tg) {
                    tg.openLink(urlDestino);
                } else {
                    window.open(urlDestino, '_blank');
                }
            } else {
                if (tg) {
                    tg.showAlert("⚠️ Película próximamente disponible. Estamos subiendo el archivo de video con los anuncios.");
                } else {
                    alert("Contenido no disponible todavía.");
                }
            }
        }


        function verAnuncio() {
            if (tg) tg.showAlert("▶️ Cargando video publicitario...");
            else alert("Cargando anuncio...");
        }

        function activarVip() {
            if (tg) {
                tg.showPopup({
                    title: 'Suscripción VIP',
                    message: '¿Quieres desbloquear todo el catálogo sin anuncios?',
                    buttons: [{id: 'vip', type: 'default', text: 'Obtener Cuenta VIP'}, {type: 'cancel', text: 'Luego'}]
                });
            } else {
                alert("Pase VIP Premium.");
            }
        }
    </script>
</body>
