<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Corregido: Evita zooms e interacciones accidentales en celulares -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cine Bot</title>

    <!-- SDK Oficial de Telegram Mini Apps -->
    <script src="https://telegram.org"></script>

    <style>
        :root {
            /* Variables globales integradas con los colores del Telegram del usuario */
            --bg-color: var(--tg-theme-bg-color, #0b0b0b);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #aaaaaa);
            --button-bg: var(--tg-theme-button-color, #1f1f1f);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            -webkit-user-select: none; /* Evita que el usuario seleccione texto por error al tocar la pantalla */
            user-select: none;
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #111;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            color: #e50914;
            font-size: 22px;
            font-weight: bold;
        }
          
        /* MENU */
        .menu {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px;
            background: #0b0b0b;
            scrollbar-width: none; /* Oculta barra de scroll en Firefox */
        }
        .menu::-webkit-scrollbar {
            display: none; /* Oculta barra de scroll en Chrome/Safari (móviles) */
        }

        .menu button {
            background: var(--button-bg);
            border: none;
            color: var(--button-text);
            padding: 10px 14px;
            border-radius: 20px;
            white-space: nowrap;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        /* HOME */
        .section {
            padding: 15px;
        }

        .title {
            font-size: 18px;
            margin: 10px 0;
            color: #e5e5e5;
        }

        /* CARDS */
        .row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .card {
            min-width: 140px;
            max-width: 140px;
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .card:active {
            transform: scale(0.97); /* Efecto feedback táctil nativo al presionar en celular */
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card p {
            margin: 5px;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Evita que títulos largos rompan la tarjeta */
        }

        /* VISTAS */
        .view {
            display: none;
            padding: 15px;
        }

        .active {
            display: block;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: #111;
            padding: 20px;
            width: 85%;
            max-width: 400px;
            border-radius: 12px;
            position: relative;
            text-align: center;
        }

        .close {
            position: absolute;
            right: 15px;
            top: 10px;
            cursor: pointer;
            font-size: 24px;
            color: #aaa;
        }

        .btn {
            display: block;
            width: 100%;
            background: #222;
            color: white;
            border: none;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .vip {
            background: gold;
            color: black;
        }
        
        .btn-volver {
            background: #333;
        }

        .banner-slider {
            width: 100%;
            margin-bottom: 15px;
        }

        .banner-slider img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
        }

        .banner-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
        }

        .active-dot {
            background: white;
        }

        /* SEARCH BOX */
        .search-box {
            padding: 10px 15px;
            background: #0b0b0b;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #1a1a1a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>

    <!-- MODAL FICHA -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">✖</span>
            <h2 id="modal-title">Título</h2>
            <img id="modal-img" src="" style="width:100%; height: 220px; object-fit: cover; border-radius:10px;">
            <p id="modal-info" style="color: gold; font-weight: bold;">⭐ 8.5 | 🎭 Acción | 🕒 120 min</p>
            <p id="modal-desc">Descripción de la película</p>
            <button class="btn" onclick="verAnuncio()">📺 Ver con anuncios</button>
            <button class="btn vip" onclick="activarVip()">💎 VIP</button>
            <button class="btn btn-volver" onclick="cerrarModal()">⬅ Volver</button>
        </div>
    </div>

    <!-- HEADER -->
    <div class="header">
        <div class="logo">CINE DEMO</div>
    </div>

    <!-- BUSCADOR -->
    <div class="search-box">
        <input type="text" id="buscar" placeholder="🔍 Buscar película..." onkeyup="buscarPelicula()">
    </div>

    <!-- MENU -->
    <div class="menu">
        <button onclick="show('home')">🏠 Inicio</button>
        <button onclick="show('peliculas')">🎬 Películas</button>
        <button onclick="show('series')">📺 Series</button>
        <button onclick="show('anime')">🎌 Anime</button>
        <button onclick="show('adulto')">🔞 +18</button>
    </div>

    <!-- HOME -->
    <div id="home" class="view active">
        <div class="section">
            <div class="title">🔥 Destacadas</div>
            <div class="banner-slider">
                <img id="banner-img" src="https://picsum.photos/800/400?20">
            </div>
            <div class="banner-dots">
                <span class="dot active-dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
            
            <div class="title">Tendencias</div>
            <div class="row">
                <div class="card pelicula" onclick="abrirModal('Acción Total', 'https://picsum.photos/200/300?1', '⭐ 8.5 | 🎭 Acción | 🕒 120 min', 'Película de acción explosiva llena de adrenalina.')">
                    <img src="https://picsum.photos/200/300?1">
                    <p>Acción Total</p>
                </div>
                <div class="card pelicula" onclick="abrirModal('Terror Nocturno', 'https://picsum.photos/200/300?2', '⭐ 7.2 | 🎭 Terror | 🕒 95 min', 'Una noche aterradora que nadie podrá olvidar.')">
                    <img src="https://picsum.photos/200/300?2">
                    <p>Terror Nocturno</p>
                </div>
                <div class="card pelicula" onclick="abrirModal('Aventura Final', 'https://picsum.photos/200/300?3', '⭐ 9.0 | 🎭 Aventura | 🕒 145 min', 'Una aventura épica alrededor del mundo.')">
                    <img src="https://picsum.photos/200/300?3">
                    <p>Aventura Final</p>
                </div>
            </div>
        </div>
    </div>

    <!-- GÉNEROS PRINCIPALES -->
    <div id="peliculas" class="view">
        <div class="title">🎬 Géneros</div>
        <div class="row">
            <div class="card" onclick="show('accion')">
                <img src="https://picsum.photos/200/300?10">
                <p>Acción</p>
            </div>
            <div class="card" onclick="show('terror')">
                <img src="https://picsum.photos/200/300?11">
                <p>Terror</p>
            </div>
            <div class="card" onclick="show('romance')">
                <img src="https://picsum.photos/200/300?12">
                <p>Romance</p>
            </div>
            <div class="card" onclick="show('aventura')">
                <img src="https://picsum.photos/200/300?13">
                <p>Aventura</p>
            </div>
        </div>
    </div>
